<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  * { box-sizing: border-box; }
  :root {
    --fg:#1a1a1a; --bg:#ffffff; --border:#cfd2d6; --muted:#8a9098;
    --focus:#ff4b4b; --chip:#eef1f4; --chip-br:#d7dce1;
    font-family: "Source Sans Pro", system-ui, -apple-system, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --fg:#e8e8e8; --bg:#0e1117; --border:#3a3f47; --muted:#7a828b;
            --chip:#1c222b; --chip-br:#39414c; }
  }
  .prompt {
    font-size: 19px; line-height: 1.9; padding: 13px 15px; width: 100%;
    min-height: 96px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--bg); color: var(--fg); outline: none;
    white-space: pre-wrap; word-break: break-word; caret-color: var(--focus);
  }
  .prompt:focus-within { border-color: var(--focus); }
  .prompt:empty:before { content: attr(data-ph); color: var(--muted); }

  /* --- inline chip base --- */
  .chip {
    display: inline-flex; align-items: center; gap: 5px; vertical-align: baseline;
    padding: 1px 8px; margin: 0 1px; border-radius: 999px; font-size: 0.86em;
    background: var(--chip); border: 1px solid var(--chip-br); cursor: pointer;
    user-select: none; -webkit-user-select: none; position: relative;
    line-height: 1.5; white-space: nowrap;
  }
  .chip b { font-variant-numeric: tabular-nums; font-weight: 700; }
  .chip .step {
    display: inline-flex; align-items: center; justify-content: center;
    width: 17px; height: 17px; border-radius: 50%; background: rgba(127,127,127,.16);
    font-weight: 700; line-height: 1;
  }
  .chip .step:active { background: var(--focus); color: #fff; }
  .chip.count { color: #2b6cb0; }
  .chip.percent { background:#2f6fd0; border-color:#2f6fd0; color:#fff; }
  .chip.angle { background:#c0392b; border-color:#c0392b; color:#fff; }
  .chip.preset { color: var(--fg); }
  .swatch { width: 15px; height: 15px; border-radius: 50%;
            border: 1px solid rgba(0,0,0,.25); box-shadow: 0 0 0 1px rgba(255,255,255,.35) inset; }

  /* mini dial for angle */
  .dial { width: 15px; height: 15px; }
  .dial line { stroke: #fff; stroke-width: 2; stroke-linecap: round; }
  .dial circle { fill: none; stroke: rgba(255,255,255,.5); stroke-width: 1.5; }

  /* percent slider popover */
  .pop {
    position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%);
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 10px; box-shadow: 0 6px 22px rgba(0,0,0,.22); z-index: 20;
    display: none; align-items: center; gap: 8px; cursor: default;
  }
  .pop.open { display: flex; }
  .pop input[type=range] { width: 120px; accent-color: var(--focus); }
  .pop input[type=color] { width: 26px; height: 26px; border: none; background: none; padding: 0; }

  .row { display:flex; justify-content:space-between; align-items:center;
         margin-top: 8px; font-size: 12px; color: var(--muted); }
  kbd { border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 5px;
        padding: 1px 6px; font-size: 11px; color: var(--fg); }
</style>
</head>
<body>
  <div id="prompt" class="prompt" contenteditable="true" spellcheck="false"
       data-ph="Опишите картинку: «нарисуй 4 девушки, синий фон, резкость 80%…»"></div>
  <div class="row">
    <span>Параметры в тексте — <b>кликабельные</b>. Число ±, процент — слайдер, цвет — пипетка, угол — диск.</span>
    <span id="status"></span>
  </div>

<script>
// ============================================================================
// Inline parameter chips over a contenteditable prompt.
//
// Source of truth = the plain text serialized from the field. On a short
// debounce we re-scan the text, wrap recognised parameter tokens (that are NOT
// under the caret) into interactive chips, and restore the caret by character
// offset. Editing a chip rewrites its backing text in place — no model round
// trip, so the core autocomplete engine and its benchmarks are untouched.
// ============================================================================
const el = document.getElementById("prompt");
const statusEl = document.getElementById("status");

// ---------- RU colour lexicon (stem -> hex) ---------------------------------
const COLORS = [
  ["красн", "#e23b3b"], ["син", "#3167e0"], ["голуб", "#49b6f0"],
  ["зелён", "#33a852"], ["зелен", "#33a852"], ["жёлт", "#f3c62a"], ["желт", "#f3c62a"],
  ["оранжев", "#f5842a"], ["фиолетов", "#8a3ff0"], ["розов", "#f06fae"],
  ["чёрн", "#222222"], ["черн", "#222222"], ["бел", "#ececec"], ["сер", "#9aa0a6"],
  ["коричнев", "#96613b"], ["бирюзов", "#1ec5c5"], ["золот", "#d4af37"],
  ["серебр", "#c3c7cc"], ["пурпурн", "#a12bb0"], ["бордов", "#8c2231"],
];
const COLOR_STEMS = COLORS.map((c) => c[0]);
function colorHex(word) {
  const w = word.toLowerCase();
  let base = null;
  for (const [stem, hex] of COLORS) if (w.includes(stem)) { base = hex; break; }
  if (!base) return "#888888";
  // тёмно-/светло-/ярко- prefixes nudge the lightness
  if (/тёмно|темно/.test(w)) base = shade(base, -0.28);
  else if (/светло|бледно/.test(w)) base = shade(base, 0.30);
  else if (/ярко/.test(w)) base = shade(base, 0.10);
  return base;
}
function shade(hex, amt) {
  let n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  const f = amt < 0 ? (1 + amt) : 1, add = amt > 0 ? amt * 255 : 0;
  r = Math.max(0, Math.min(255, Math.round(r * f + add)));
  g = Math.max(0, Math.min(255, Math.round(g * f + add)));
  b = Math.max(0, Math.min(255, Math.round(b * f + add)));
  return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// ---------- RU numerals 0..10, both genders ---------------------------------
const NUM_M = ["ноль","один","два","три","четыре","пять","шесть","семь","восемь","девять","десять"];
const NUM_F = ["ноль","одна","две","три","четыре","пять","шесть","семь","восемь","девять","десять"];
const WORD2NUM = {};
NUM_M.forEach((w, i) => WORD2NUM[w] = i);
NUM_F.forEach((w, i) => WORD2NUM[w] = i);

// preset cycles: click a chip to step through a related list
const PRESETS = {
  res: ["720p", "1080p", "2k", "4k", "8k"],
  style: ["в стиле 1999", "в стиле 2004", "в стиле 2010", "ретро", "неон", "винтаж"],
};

// ---------- detectors: each returns {s,e,type,...} matches over `text` -------
function detect(text) {
  const hits = [];
  const push = (m, type, extra) => hits.push(Object.assign(
    { s: m.index, e: m.index + m[0].length, type }, extra));
  let m, re;

  re = /(\d+)\s*%/g;                       // percent
  while ((m = re.exec(text))) push(m, "percent", { val: +m[1] });

  re = /(\d+)\s*(?:°|градус(?:ов|а)?)/gi;  // angle
  while ((m = re.exec(text))) push(m, "angle", { val: +m[1] });

  // resolution presets (4k / 1080p / …)
  re = /\b(720p|1080p|2k|4k|8k|hd|full\s?hd)\b/gi;
  while ((m = re.exec(text))) push(m, "preset", { kind: "res" });

  // style year: «в стиле 2004» or a bare 19xx/20xx
  re = /(?:в\s+стиле\s+)?((?:19|20)\d{2})/g;
  while ((m = re.exec(text))) push(m, "preset", { kind: "style" });

  // colours (optional тёмно-/светло- prefix). NB: JS \w excludes Cyrillic, so
  // the stem is extended with an explicit [а-яё]* tail to catch the full ending.
  const stems = COLOR_STEMS.join("[а-яё]*|") + "[а-яё]*";
  re = new RegExp("(?:тёмно-|темно-|светло-|ярко-|бледно-)?(?:" + stems + ")", "gi");
  while ((m = re.exec(text))) push(m, "color", {});

  // count: a number/numeral immediately followed by a Cyrillic noun. We wrap
  // ONLY the number; the trailing word just qualifies it as a real quantity.
  const numAlt = "\\d{1,3}|" + Object.keys(WORD2NUM).join("|");
  re = new RegExp("\\b(" + numAlt + ")(\\s+[а-яё]{2,})", "gi");
  while ((m = re.exec(text))) {
    const s = m.index, e = s + m[1].length;         // number token only
    hits.push({ s, e, type: "count", word: m[1] });
  }

  // greedily keep earliest, non-overlapping matches
  hits.sort((a, b) => a.s - b.s || (b.e - b.s) - (a.e - a.s));
  const out = []; let last = -1;
  for (const h of hits) if (h.s >= last) { out.push(h); last = h.e; }
  return out;
}

// ---------- plain-text (de)serialization of the field -----------------------
function textLen(node) {
  if (node.nodeType === 3) return node.data.length;
  if (node.classList && node.classList.contains("chip")) return node.dataset.text.length;
  let n = 0; for (const c of node.childNodes) n += textLen(c); return n;
}
function serialize(root) {
  let out = "";
  for (const c of root.childNodes) {
    if (c.nodeType === 3) out += c.data;
    else if (c.classList && c.classList.contains("chip")) out += c.dataset.text;
    else if (c.tagName === "BR") out += "\n";
    else out += serialize(c);
  }
  return out;
}

// ---------- caret <-> absolute character offset -----------------------------
function getCaret(root) {
  const sel = getSelection();
  if (!sel.rangeCount) return null;
  const r = sel.getRangeAt(0);
  if (!root.contains(r.endContainer)) return null;
  const pre = r.cloneRange();
  pre.selectNodeContents(root);
  pre.setEnd(r.endContainer, r.endOffset);
  const frag = pre.cloneContents();
  let n = 0; for (const c of frag.childNodes) n += textLen(c);
  return n;
}
function setCaret(root, off) {
  if (off == null) return;
  let remaining = off;
  const walk = (node) => {
    for (const c of node.childNodes) {
      if (c.nodeType === 3) {
        if (remaining <= c.data.length) {
          const r = document.createRange();
          r.setStart(c, remaining); r.collapse(true);
          const sel = getSelection(); sel.removeAllRanges(); sel.addRange(r);
          return true;
        }
        remaining -= c.data.length;
      } else if (c.classList && c.classList.contains("chip")) {
        const len = c.dataset.text.length;
        if (remaining <= len) {                       // land just after the chip
          const r = document.createRange();
          r.setStartAfter(c); r.collapse(true);
          const sel = getSelection(); sel.removeAllRanges(); sel.addRange(r);
          return true;
        }
        remaining -= len;
      } else if (c.tagName === "BR") {
        if (remaining <= 1) { const r = document.createRange();
          r.setStartAfter(c); r.collapse(true);
          const sel = getSelection(); sel.removeAllRanges(); sel.addRange(r); return true; }
        remaining -= 1;
      } else if (walk(c)) return true;
    }
    return false;
  };
  if (!walk(root)) {                                  // fall through to the end
    const r = document.createRange();
    r.selectNodeContents(root); r.collapse(false);
    const sel = getSelection(); sel.removeAllRanges(); sel.addRange(r);
  }
}

// ---------- chip factories --------------------------------------------------
function reflow() {                                   // re-read text after a chip edit
  statusEl.textContent = serialize(el).trim() ? "готово" : "";
}
function chipEl(cls, dataText) {
  const c = document.createElement("span");
  c.className = "chip " + cls;
  c.contentEditable = "false";
  c.dataset.text = dataText;
  return c;
}

function makeCount(h) {
  const isWord = isNaN(+h.word);
  const fem = isWord && NUM_F.includes(h.word.toLowerCase());
  let val = isWord ? WORD2NUM[h.word.toLowerCase()] : +h.word;
  const c = chipEl("count", h.word);
  const render = () => {
    const disp = isWord ? (fem ? NUM_F : NUM_M)[Math.min(val, 10)] : String(val);
    c.dataset.text = disp;
    c.innerHTML = "";
    const minus = mkStep("−", () => { val = Math.max(0, val - 1); render(); reflow(); });
    const b = document.createElement("b"); b.textContent = disp;
    const plus = mkStep("+", () => { val = Math.min(isWord ? 10 : 999, val + 1); render(); reflow(); });
    c.append(minus, b, plus);
  };
  render();
  return c;
}
function mkStep(sym, fn) {
  const s = document.createElement("span"); s.className = "step"; s.textContent = sym;
  s.addEventListener("mousedown", (e) => { e.preventDefault(); e.stopPropagation(); fn(); });
  return s;
}

function makePercent(h) {
  let val = h.val;
  const c = chipEl("percent", val + "%");
  const b = document.createElement("b");
  const pop = document.createElement("span"); pop.className = "pop";
  const range = document.createElement("input");
  range.type = "range"; range.min = 0; range.max = 100; range.value = val;
  const lbl = document.createElement("span");
  const paint = () => { b.textContent = val + "%"; lbl.textContent = val + "%";
                        c.dataset.text = val + "%"; };
  range.addEventListener("input", (e) => { e.stopPropagation(); val = +range.value; paint(); reflow(); });
  pop.append(range, lbl); c.append(b, pop); paint();
  c.addEventListener("mousedown", (e) => { e.preventDefault(); e.stopPropagation();
    document.querySelectorAll(".pop.open").forEach((p) => p !== pop && p.classList.remove("open"));
    pop.classList.toggle("open"); });
  pop.addEventListener("mousedown", (e) => e.stopPropagation());
  return c;
}

function makeAngle(h) {
  let val = h.val % 360;
  const c = chipEl("angle", val + "°");
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", "0 0 20 20"); svg.setAttribute("class", "dial");
  const circ = document.createElementNS(svg.namespaceURI, "circle");
  circ.setAttribute("cx", 10); circ.setAttribute("cy", 10); circ.setAttribute("r", 8);
  const line = document.createElementNS(svg.namespaceURI, "line");
  line.setAttribute("x1", 10); line.setAttribute("y1", 10);
  svg.append(circ, line);
  const b = document.createElement("b");
  const paint = () => {
    const a = (val - 90) * Math.PI / 180;             // 0° points up
    line.setAttribute("x2", 10 + 7 * Math.cos(a));
    line.setAttribute("y2", 10 + 7 * Math.sin(a));
    b.textContent = val + "°"; c.dataset.text = val + "°";
  };
  const drag = (e) => {
    const rect = svg.getBoundingClientRect();
    const dx = e.clientX - (rect.left + rect.width / 2);
    const dy = e.clientY - (rect.top + rect.height / 2);
    val = Math.round((Math.atan2(dy, dx) * 180 / Math.PI + 90 + 360) % 360);
    paint(); reflow();
  };
  svg.addEventListener("mousedown", (e) => {
    e.preventDefault(); e.stopPropagation(); drag(e);
    const move = (ev) => drag(ev);
    const up = () => { document.removeEventListener("mousemove", move);
                       document.removeEventListener("mouseup", up); };
    document.addEventListener("mousemove", move); document.addEventListener("mouseup", up);
  });
  c.append(svg, b); paint();
  return c;
}

function makeColor(h, word) {
  const c = chipEl("color", word);
  const sw = document.createElement("span"); sw.className = "swatch";
  const hex = colorHex(word); sw.style.background = hex;
  const txt = document.createElement("span"); txt.textContent = word;
  const inp = document.createElement("input"); inp.type = "color"; inp.value = hex;
  inp.style.width = "0"; inp.style.height = "0"; inp.style.opacity = "0"; inp.style.position = "absolute";
  inp.addEventListener("input", (e) => { e.stopPropagation(); sw.style.background = inp.value;
    c.dataset.hex = inp.value; });
  c.append(sw, txt, inp);
  c.addEventListener("mousedown", (e) => { e.preventDefault(); e.stopPropagation(); inp.click(); });
  return c;
}

function makePreset(h, word) {
  const list = PRESETS[h.kind] || [word];
  let i = list.findIndex((v) => v.toLowerCase() === word.toLowerCase());
  if (i < 0) { list.unshift(word); i = 0; }
  const c = chipEl("preset", word);
  const b = document.createElement("b"); const caret = document.createElement("span");
  caret.textContent = "▸"; caret.style.opacity = ".55";
  const paint = () => { b.textContent = list[i]; c.dataset.text = list[i]; };
  c.append(b, caret); paint();
  c.addEventListener("mousedown", (e) => { e.preventDefault(); e.stopPropagation();
    i = (i + 1) % list.length; paint(); reflow(); });
  return c;
}

function buildChip(h, text) {
  const raw = text.slice(h.s, h.e);
  switch (h.type) {
    case "count":   return makeCount(h);
    case "percent": return makePercent(h);
    case "angle":   return makeAngle(h);
    case "color":   return makeColor(h, raw);
    case "preset":  return makePreset(h, raw);
  }
}

// ---------- (re)render the field: text + chips, caret preserved -------------
let composing = false;
function rerender(force) {
  if (composing) return;
  const text = serialize(el);
  const caret = getCaret(el);
  const hits = detect(text).filter((h) => force || caret == null ||
                                          caret < h.s || caret > h.e); // skip token under caret
  const frag = document.createDocumentFragment();
  let i = 0;
  for (const h of hits) {
    if (h.s > i) frag.append(document.createTextNode(text.slice(i, h.s)));
    frag.append(buildChip(h, text));
    i = h.e;
  }
  if (i < text.length) frag.append(document.createTextNode(text.slice(i)));
  // avoid clobbering the DOM (and caret) if nothing structural changed
  const sig = hits.map((h) => h.type + h.s + h.e).join(",");
  if (!force && sig === el._sig) return;
  el._sig = sig;
  el.innerHTML = ""; el.append(frag);
  setCaret(el, caret);
  reflow();
}

let deb = null;
el.addEventListener("input", () => { clearTimeout(deb); deb = setTimeout(rerender, 140); });
el.addEventListener("keydown", (e) => {                // chipify eagerly on word boundary
  if (e.key === " " || e.key === "," || e.key === "Enter") setTimeout(rerender, 0);
});
el.addEventListener("compositionstart", () => { composing = true; });
el.addEventListener("compositionend", () => { composing = false; rerender(); });
document.addEventListener("mousedown", (e) => {        // close popovers on outside click
  if (!e.target.closest(".chip")) document.querySelectorAll(".pop.open").forEach((p) => p.classList.remove("open"));
});

// seed demo text so the concept is visible on load
window.addEventListener("load", () => {
  el.textContent = "нарисуй 4 девушки, синий фон, резкость 80%, поверни на 30°, в стиле 2004, качество 8k";
  rerender(true);
});
</script>
</body>
</html>
