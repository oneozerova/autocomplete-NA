<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  * { box-sizing: border-box; }
  :root {
    --fg:#1a1a1a; --bg:#ffffff; --border:#cfd2d6; --muted:#8a9098; --ghost:#b0b4ba;
    --focus:#ff4b4b; --chip:#eef1f4; --chip-br:#d7dce1;
    font-family: "Source Sans Pro", system-ui, -apple-system, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --fg:#e8e8e8; --bg:#0e1117; --border:#3a3f47; --muted:#7a828b; --ghost:#5b626b;
            --chip:#1c222b; --chip-br:#39414c; }
  }
  .prompt {
    font-size: 19px; line-height: 1.9; padding: 13px 15px; width: 100%;
    min-height: 96px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--bg); color: var(--fg); outline: none;
    white-space: pre-wrap; word-break: break-word; caret-color: var(--focus);
  }
  .prompt:focus-within { border-color: var(--focus); }
  .prompt:empty:before { content: attr(data-ph); color: var(--muted); }

  /* inline offline ending-ghost + LLM phrase (dotted) — mirror ghost.html */
  .ghost  { color: var(--ghost); }
  .phrase { color: var(--ghost); border-bottom: 1px dotted var(--muted); }

  /* --- inline chip base --- */
  .chip {
    display: inline-flex; align-items: center; gap: 5px; vertical-align: baseline;
    padding: 1px 8px; margin: 0 1px; border-radius: 999px; font-size: 0.86em;
    background: var(--chip); border: 1px solid var(--chip-br); cursor: pointer;
    user-select: none; -webkit-user-select: none; position: relative;
    line-height: 1.5; white-space: nowrap;
  }
  .chip b { font-variant-numeric: tabular-nums; font-weight: 700; }
  .chip .step {
    display: inline-flex; align-items: center; justify-content: center;
    width: 17px; height: 17px; border-radius: 50%; background: rgba(127,127,127,.16);
    font-weight: 700; line-height: 1;
  }
  .chip .step:active { background: var(--focus); color: #fff; }
  .chip.count { color: #2b6cb0; }
  .chip.percent { background:#2f6fd0; border-color:#2f6fd0; color:#fff; }
  .chip.angle { background:#c0392b; border-color:#c0392b; color:#fff; }
  .chip.preset { color: var(--fg); }
  .swatch { width: 15px; height: 15px; border-radius: 50%;
            border: 1px solid rgba(0,0,0,.25); box-shadow: 0 0 0 1px rgba(255,255,255,.35) inset; }
  .dial { width: 15px; height: 15px; }
  .dial line { stroke: #fff; stroke-width: 2; stroke-linecap: round; }
  .dial circle { fill: none; stroke: rgba(255,255,255,.5); stroke-width: 1.5; }
  .pop {
    position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%);
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 10px; box-shadow: 0 6px 22px rgba(0,0,0,.22); z-index: 20;
    display: none; align-items: center; gap: 8px; cursor: default;
  }
  .pop.open { display: flex; }
  .pop input[type=range] { width: 120px; accent-color: var(--focus); }

  .row { display:flex; justify-content:space-between; align-items:center;
         margin-top: 8px; font-size: 12px; color: var(--muted); }
  kbd { border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 5px;
        padding: 1px 6px; font-size: 11px; color: var(--fg); }
  #spin { color: var(--muted); font-size: 11px; }
  #status { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div id="prompt" class="prompt" contenteditable="true" spellcheck="false"
       data-ph="Опишите картинку: «нарисуй 4 девушки в тёмном лес…» (Tab — принять)"></div>
  <div class="row">
    <span id="hint"><kbd>Tab</kbd> — принять подсказку · числа/цвета/углы кликабельны</span>
    <span><span id="spin"></span> <span id="status"></span></span>
  </div>

<script>

}
function setCaret(root, off) {
  if (off == null) return;
  let remaining = off;
  const walk = (node) => {
    for (const c of node.childNodes) {
      if (isAux(c)) continue;
      if (c.nodeType === 3) {
        if (remaining <= c.data.length) {
          const r = document.createRange(); r.setStart(c, remaining); r.collapse(true);
          const sel = getSelection(); sel.removeAllRanges(); sel.addRange(r); return true;
        }
        remaining -= c.data.length;
      } else if (c.classList && c.classList.contains("chip")) {
        const len = c.dataset.text.length;
        if (remaining <= len) {
          const r = document.createRange();
          // offset 0 means *before* the chip — placing the caret after it would
          // teleport the caret across a leading chip («4 девушки…») on every rebuild
          if (remaining === 0) r.setStartBefore(c); else r.setStartAfter(c);
          r.collapse(true);
          const sel = getSelection(); sel.removeAllRanges(); sel.addRange(r); return true;
        }
        remaining -= len;
      } else if (c.tagName === "BR") {
        if (remaining <= 1) { const r = document.createRange(); r.setStartAfter(c); r.collapse(true);
          const sel = getSelection(); sel.removeAllRanges(); sel.addRange(r); return true; }
        remaining -= 1;
      } else if (walk(c)) return true;
    }
    return false;
  };
  if (!walk(root)) {
    const r = document.createRange(); r.selectNodeContents(root); r.collapse(false);
    const sel = getSelection(); sel.removeAllRanges(); sel.addRange(r);
  }
}
function chipEl(cls, dataText) {
  const c = document.createElement("span");
  c.className = "chip " + cls; c.contentEditable = "false"; c.dataset.text = dataText;
  return c;
}
function mkStep(sym, fn) {
  const s = document.createElement("span"); s.className = "step"; s.textContent = sym;
  s.addEventListener("mousedown", (e) => { e.preventDefault(); e.stopPropagation(); fn(); });
  return s;
}
function makeCount(h) {
  const isWord = isNaN(+h.word);
  const fem = isWord && NUM_F.includes(h.word.toLowerCase());
  let val = isWord ? WORD2NUM[h.word.toLowerCase()] : +h.word;
  const c = chipEl("count", h.word);
  const render = () => {
    const disp = isWord ? (fem ? NUM_F : NUM_M)[Math.min(val, 10)] : String(val);
    c.dataset.text = disp; c.innerHTML = "";
    const minus = mkStep("−", () => { val = Math.max(0, val - 1); render(); reflow(); });
    const b = document.createElement("b"); b.textContent = disp;
    const plus = mkStep("+", () => { val = Math.min(isWord ? 10 : 999, val + 1); render(); reflow(); });
    c.append(minus, b, plus);
  };
  render(); return c;
}
function makePercent(h) {
  let val = h.val;
  const c = chipEl("percent", val + "%");
  const b = document.createElement("b");
  const pop = document.createElement("span"); pop.className = "pop";
  const range = document.createElement("input");
  range.type = "range"; range.min = 0; range.max = 100; range.value = val;
  const lbl = document.createElement("span");
  const paint = () => { b.textContent = val + "%"; lbl.textContent = val + "%"; c.dataset.text = val + "%"; };
  range.addEventListener("input", (e) => { e.stopPropagation(); val = +range.value; paint(); reflow(); });
  pop.append(range, lbl); c.append(b, pop); paint();
  c.addEventListener("mousedown", (e) => { e.preventDefault(); e.stopPropagation();
    document.querySelectorAll(".pop.open").forEach((p) => p !== pop && p.classList.remove("open"));
    pop.classList.toggle("open"); });
  pop.addEventListener("mousedown", (e) => e.stopPropagation());
  return c;
}
function makeAngle(h) {
  let val = h.val % 360;
  const c = chipEl("angle", val + "°");
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", "0 0 20 20"); svg.setAttribute("class", "dial");
  const circ = document.createElementNS(svg.namespaceURI, "circle");
  circ.setAttribute("cx", 10); circ.setAttribute("cy", 10); circ.setAttribute("r", 8);
  const line = document.createElementNS(svg.namespaceURI, "line");
  line.setAttribute("x1", 10); line.setAttribute("y1", 10);
  svg.append(circ, line);
  const b = document.createElement("b");
  const paint = () => {
    const a = (val - 90) * Math.PI / 180;
    line.setAttribute("x2", 10 + 7 * Math.cos(a));
    line.setAttribute("y2", 10 + 7 * Math.sin(a));
    b.textContent = val + "°"; c.dataset.text = val + "°";
  };
  const drag = (e) => {
    const rect = svg.getBoundingClientRect();
    const dx = e.clientX - (rect.left + rect.width / 2);
    const dy = e.clientY - (rect.top + rect.height / 2);
    val = Math.round((Math.atan2(dy, dx) * 180 / Math.PI + 90 + 360) % 360);
    paint(); reflow();
  };
  svg.addEventListener("mousedown", (e) => {
    e.preventDefault(); e.stopPropagation(); drag(e);
    const move = (ev) => drag(ev);
    const up = () => { document.removeEventListener("mousemove", move);
                       document.removeEventListener("mouseup", up); };
    document.addEventListener("mousemove", move); document.addEventListener("mouseup", up);
  });
  c.append(svg, b); paint(); return c;
}
function makeColor(h, word) {
  let cur = word;                       // the word as it stands in the prompt text
  const c = chipEl("color", cur);
  const sw = document.createElement("span"); sw.className = "swatch";
  const txt = document.createElement("span");
  const inp = document.createElement("input"); inp.type = "color";
  inp.style.cssText = "width:0;height:0;opacity:0;position:absolute;";
  c.title = "Выбрать цвет — слово в промпте изменится";
  const paint = () => {
    sw.style.background = colorHex(cur);
    inp.value = colorHex(cur);
    txt.textContent = cur;
    c.dataset.text = cur;
  };
  // A swatch that recolours but leaves the word alone is a lie: the prompt still
  // says «синий». Snap the picked colour to the nearest nameable one and rewrite
  // the word in the SAME grammatical form (морфокод из модели).
  inp.addEventListener("input", (e) => {
    e.stopPropagation();
    const form = recolor(cur, inp.value);
    if (form) { cur = form; paint(); reflow(); }
    else sw.style.background = inp.value;      // no such form in the vocab: swatch only
  });
  c.append(sw, txt, inp); paint();
  c.addEventListener("mousedown", (e) => { e.preventDefault(); e.stopPropagation(); inp.click(); });
  return c;
}
function makePreset(h, word) {
  const list = (PRESETS[h.kind] || []).slice();   // copy: unshift below must not
  let i = list.findIndex((v) => v.toLowerCase() === word.toLowerCase());
  if (i < 0) { list.unshift(word); i = 0; }       // grow the shared PRESETS array
  const c = chipEl("preset", word);
  const b = document.createElement("b"); const caret = document.createElement("span");
  caret.textContent = "▸"; caret.style.opacity = ".55";
  const paint = () => { b.textContent = list[i]; c.dataset.text = list[i]; };
  c.append(b, caret); paint();
  c.addEventListener("mousedown", (e) => { e.preventDefault(); e.stopPropagation();
    i = (i + 1) % list.length; paint(); reflow(); });
  return c;
}
function buildChip(h, text) {
  const raw = text.slice(h.s, h.e);
  switch (h.type) {
    case "count":   return makeCount(h);
    case "percent": return makePercent(h);
    case "angle":   return makeAngle(h);
    case "color":   return makeColor(h, raw);
    case "preset":  return makePreset(h, raw);
  }
}

// ============================================================================
// PART 3 — LLM phrase layer (mirrors ghost.html) =============================
// ============================================================================
const DEBOUNCE_MS = 400;
const phraseCache = new Map();
let llmEnabled = true;
let debPhrase = null, inflight = null, phrase = "";
function shouldSuggest(text) {
  if (TAIL.test(text)) return false;
  return (text.match(WORD) || []).length >= 2;
}
function requestPhrase(text) {
  if (phraseCache.has(text)) { setPhrase(phraseCache.get(text), text); return; }
  const ctrl = new AbortController(); inflight = ctrl; spin.textContent = "…";
  fetch("/next", { method: "POST", signal: ctrl.signal,
    headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text }) })
    .then((r) => r.json()).then((res) => {
      spin.textContent = "";
      if (text !== serialize(el)) return;
      if (res.reason === "no_key") {     // tell the user, don't just go quiet
        llmEnabled = false;
        hint.innerHTML = "<kbd>Tab</kbd> — принять окончание · подсказка следующего "
                       + "слова выключена: не задан OPENROUTER_API_KEY";
        return;
      }
      const s = res.ok ? res.suggestion : "";
      phraseCache.set(text, s); setPhrase(s, text, res.ttft_ms);
    }).catch(() => { spin.textContent = ""; });
}
function setPhrase(s, forText, ttft) {
  if (forText !== serialize(el)) return;
  phrase = s || "";
  if (phrase) { appendAux("phrase", phrase); if (ttft) status.textContent = `LLM ${ttft} мс`; }
}
function clearPhrase() {
  phrase = "";
  el.querySelectorAll(".phrase").forEach((n) => n.remove());
  if (inflight) { inflight.abort(); inflight = null; }
  if (debPhrase) { clearTimeout(debPhrase); debPhrase = null; }
  spin.textContent = "";
}

// ============================================================================
// PART 4 — unified wiring ====================================================
// ============================================================================
const el = document.getElementById("prompt");
const status = document.getElementById("status");
const spin = document.getElementById("spin");
const hint = document.getElementById("hint");
let ghost = "", composing = false, deb = null;

function reflow() { status.textContent = ""; }
function stripAux() { el.querySelectorAll(".ghost,.phrase").forEach((n) => n.remove()); }
function appendAux(cls, text) {
  const s = document.createElement("span");
  s.className = cls; s.contentEditable = "false"; s.textContent = text;
  el.append(s);
}

// instant offline ghost + schedule the (network) phrase — never rebuilds chips
function paintGhost() {
  clearPhrase();
  stripAux();
  ghost = "";
  const T = serialize(el);
  const caret = getCaret(el);
  const t0 = performance.now();
  if (caret != null && caret === T.length) {
    const g = ghostFor(T);
    if (g) { ghost = g; appendAux("ghost", g); }
  }
  status.textContent = ghost ? `${(performance.now() - t0).toFixed(1)} мс` : "";
  if (llmEnabled && caret === T.length && !ghost && shouldSuggest(T)) {
    debPhrase = setTimeout(() => requestPhrase(T), DEBOUNCE_MS);
  }
}

// newlines live in the plain text as "\n" and in the DOM as <br> (see serialize)
function appendText(frag, s) {
  s.split("\n").forEach((part, i) => {
    if (i) frag.append(document.createElement("br"));
    if (part) frag.append(document.createTextNode(part));
  });
}

// debounced chip re-render, caret preserved; skips the token under the caret
function chipify(force) {
  if (composing) return;
  stripAux();
  const text = serialize(el);
  const caret = getCaret(el);
  const hits = detect(text).filter((h) => force || caret == null || caret < h.s || caret > h.e);
  const sig = hits.map((h) => h.type + h.s + h.e).join(",");
  if (!force && sig === el._sig) return;               // nothing structural changed
  el._sig = sig;
  const frag = document.createDocumentFragment();
  let i = 0;
  for (const h of hits) {
    if (h.s > i) appendText(frag, text.slice(i, h.s));
    frag.append(buildChip(h, text));
    i = h.e;
  }
  if (i < text.length) appendText(frag, text.slice(i));
  el.innerHTML = ""; el.append(frag);
  setCaret(el, caret);
}

function refresh(force) { chipify(force); paintGhost(); }

el.addEventListener("input", () => {
  paintGhost();                                        // instant ending-ghost
  clearTimeout(deb); deb = setTimeout(() => refresh(false), 140);  // settle chips
});
el.addEventListener("keydown", (e) => {
  if (e.key === "Tab" && (ghost || phrase)) {
    e.preventDefault();
    // a safe-partial ghost lands mid-word («детализирован» + «н») — a space there
    // would break the word in half
    const add = ghost ? ghost + (ghostPartial ? "" : " ") : phrase + " ";
    clearPhrase(); stripAux(); ghost = "";
    const last = el.lastChild;
    if (last && last.nodeType === 3) last.data += add;
    else el.append(document.createTextNode(add));
    const r = document.createRange(); r.selectNodeContents(el); r.collapse(false);
    const sel = getSelection(); sel.removeAllRanges(); sel.addRange(r);
    refresh(false);
    return;
  }
  // browsers answer Enter with a <div> block, which serialize() flattens away —
  // the line break silently vanished 140 ms later. Insert a <br> ourselves.
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    stripAux(); clearPhrase(); ghost = "";
    document.execCommand("insertLineBreak");
    setTimeout(() => refresh(false), 0);
    return;
  }
  if (e.key === " " || e.key === ",") setTimeout(() => refresh(false), 0);
});
// paste dropped raw HTML (fonts, colours, even <img>) straight into the field
el.addEventListener("paste", (e) => {
  e.preventDefault();
  const t = (e.clipboardData || window.clipboardData).getData("text/plain");
  document.execCommand("insertText", false, t.replace(/\r\n?/g, "\n"));
});
el.addEventListener("compositionstart", () => { composing = true; });
el.addEventListener("compositionend", () => { composing = false; refresh(false); });
document.addEventListener("mousedown", (e) => {
  if (!e.target.closest(".chip")) document.querySelectorAll(".pop.open").forEach((p) => p.classList.remove("open"));
});

window.addEventListener("load", () => {
  el.textContent = "нарисуй 4 девушки, синий фон, резкость 80%, в тёмном лес";
  el.focus(); refresh(true);
});
</script>
</body>
